enableLeaderElection: false
port: :8088
host: 127.0.0.1

prometheusAPI: ""

modelDownload:
  image: python:3.11-slim

checkpointScanner:
  endpoint: http://checkpoint-scanner:7330
  timeoutSeconds: 30
  intervalSeconds: 0
  batchSize: 100

checkpoint:
  staging:
    enabled: true
    mountPath: /checkpoint-staging
    medium: disk
  agent:
    enabled: true
    image: orbit-checkpoint-agent
    backendEndpoint: http://backend:8088
    internalToken: local-compose-checkpoint-internal-token
    uploadConcurrency: 4
    bandwidthLimit: ""
  storage:
    backend: pvc
    finalRoot: ""
  scanner:
    mode: reconcile

postgres:
  host: postgres
  port: "5432"
  dbname: orbit
  user: postgres
  password: postgres
  sslmode: disable
  TimeZone: Asia/Shanghai

storage:
  prefix:
    user: users
    account: accounts
    public: public
  pvc:
    readWriteMany: crater-storage
    readOnlyMany: crater-storage

namespaces:
  job: crater-workspace
  image: crater-images

secrets:
  tlsSecretName: orbit-tls-secret
  tlsForwardSecretName: orbit-tls-forward-secret
  imagePullSecretName: ""

registry:
  enable: false

smtp:
  enable: false

auth:
  token:
    accessTokenSecret: local-compose-access-token-secret
    refreshTokenSecret: local-compose-refresh-token-secret
  ldap:
    enable: false
    alias: ""
    help: ""
    uid:
      source: default
  normal:
    allowRegister: true
    allowLogin: true

schedulerPlugins:
  aijob:
    enable: false
    enableProfiling: false
    profilingTimeout: 30
  spjob:
    enable: false
    predictionServiceAddress: ""
